
<div id="uml" style="padding: 1rem 0;"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor: dark ? '#CECBF6' : '#26215C',
    primaryBorderColor: dark ? '#7F77DD' : '#534AB7',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    secondaryColor: dark ? '#085041' : '#E1F5EE',
    tertiaryColor: dark ? '#3d3d3a' : '#F1EFE8',
    classText: dark ? '#CECBF6' : '#26215C',
  },
});

const diagram = `classDiagram
    direction TB

    class Logger {
        -Logger()
        +getInstance() Logger
        +formatTimestamp Function
        +formatMessage BiFunction
        +logDebug Consumer
        +logInfo Consumer
        +logWarning Consumer
        +logError Consumer
        -print(severity, message) void
        +at(severity) Consumer
    }

    class Severity {
        <<enumeration>>
        DEBUG
        INFO
        WARN
        ERROR
        +color String
    }

    class TransportStrategy {
        <<interface>>
        +compute(distanceKm) TransportResult
    }

    class TransportResult {
        <<record>>
        +name String
        +cost double
        +distance double
        +eta int
    }

    class TransportMonitor {
        -FIXED_DISTANCE_KM double
        -observers List
        -strategy TransportStrategy
        -scheduler ScheduledExecutorService
        -task ScheduledFuture
        +TransportMonitor(initialStrategy)
        +subscribe(observer) void
        +unsubscribe(observer) void
        +setStrategy(newStrategy) void
        +start(intervalMs, maxCycles) void
        +stop() void
        +isRunning() boolean
        -notifyObservers(result) void
    }

    class TransportObservers {
        +consolePrinter() Consumer
        +alertObserver(costThreshold, etaThreshold) Consumer
    }

    class App {
        +main(args) void
    }

    TransportStrategy *-- TransportResult : contains
    Logger --> Severity : uses
    TransportMonitor --> TransportStrategy : uses
    TransportMonitor --> Logger : uses
    TransportObservers --> Logger : uses
    TransportObservers ..> TransportStrategy : produces Consumer of
    App --> TransportMonitor : creates
    App ..> TransportStrategy : creates lambdas
    App --> TransportObservers : uses
    App --> Logger : uses`;

try {
  const { svg } = await mermaid.render('uml-svg', diagram);
  document.getElementById('uml').innerHTML = svg;
  const svgEl = document.querySelector('#uml svg');
  if (svgEl) {
    svgEl.style.width = '100%';
    svgEl.style.height = 'auto';
    svgEl.style.maxWidth = '100%';
  }
} catch(e) {
  document.getElementById('uml').innerHTML = '<p style="color:var(--color-text-danger);padding:1rem;">Failed to render: ' + e.message + '</p>';
}
</script>
